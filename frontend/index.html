<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LiveScope 数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{
  /* 基础色彩系统 */
  --bg:#080b14;
  --bg2:#0d1020;
  --s1:rgba(255,255,255,.04);
  --s2:rgba(255,255,255,.07);
  --s3:rgba(255,255,255,.10);
  --bd:rgba(255,255,255,.08);
  --bd2:rgba(255,255,255,.12);
  /* 强调色 */
  --ac:#7c6af7;
  --ac2:#9d8ef9;
  --cy:#06b6d4;
  --gn:#22c55e;
  --rd:#ef4444;
  --yw:#f59e0b;
  --or:#f97316;
  /* 文字 */
  --tx:#f1f5f9;
  --tx2:#cbd5e1;
  --mu:#64748b;
  --mu2:#94a3b8;
  /* 圆角 */
  --r:14px;
  --r2:10px;
  --r3:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--tx);font-size:14px;display:flex;flex-direction:column;
  /* 背景辉光 */
  background-image:
    radial-gradient(ellipse 60% 50% at 20% -10%, rgba(124,106,247,.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 110%, rgba(6,182,212,.08) 0%, transparent 60%);
}

/* ── HEADER ── */
header{
  height:56px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:rgba(8,11,20,.8);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);flex-shrink:0;gap:10px;
  position:relative;z-index:10;
}
.logo{
  font-size:15px;font-weight:800;letter-spacing:-.3px;
  background:linear-gradient(135deg,#c4b5fd 0%,#a78bfa 40%,#67e8f9 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;
}
.hdr-right{display:flex;align-items:center;gap:8px}
#live-badge{
  display:none;align-items:center;gap:6px;
  background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);
  border-radius:100px;padding:4px 12px;font-size:12px;color:var(--gn);
  font-weight:500;letter-spacing:.2px;
}
#live-badge.on{display:flex}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--gn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.5)}
  50%{opacity:.7;box-shadow:0 0 0 5px rgba(34,197,94,0)}}
.btn{
  background:var(--s2);border:1px solid var(--bd);color:var(--tx2);
  border-radius:var(--r3);padding:6px 14px;cursor:pointer;font-size:13px;
  transition:all .2s;white-space:nowrap;font-weight:500;
}
.btn:hover{background:var(--s3);border-color:var(--bd2);color:var(--tx)}
.btn-icon{padding:6px 10px;font-size:15px}
.btn-red{
  background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#fca5a5;
}
.btn-red:hover{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.5)}

/* ── LAYOUT ── */
.layout{flex:1;display:grid;grid-template-columns:240px 1fr;min-height:0;overflow:hidden}

/* ── SIDEBAR ── */
aside{
  background:rgba(8,11,20,.7);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;
}
.aside-hd{
  padding:14px 16px 8px;font-size:10px;font-weight:700;
  color:var(--mu2);text-transform:uppercase;letter-spacing:1px;flex-shrink:0;
}
.collect-form{
  padding:0 12px 14px;display:flex;flex-direction:column;gap:8px;
  border-bottom:1px solid var(--bd);flex-shrink:0;
}
select,input[type=text],input[type=password]{
  flex:1;
  background:rgba(255,255,255,.05);
  border:1px solid var(--bd);
  color:var(--tx);border-radius:var(--r3);padding:7px 12px;font-size:13px;
  outline:none;transition:all .2s;
  -webkit-appearance:none;
}
select:focus,input[type=text]:focus,input[type=password]:focus{
  border-color:rgba(124,106,247,.5);
  background:rgba(255,255,255,.07);
  box-shadow:0 0 0 3px rgba(124,106,247,.12);
}
select{cursor:pointer;width:100%}
#start-btn{
  width:100%;padding:8px;font-size:13px;font-weight:600;
  background:linear-gradient(135deg,rgba(124,106,247,.3),rgba(6,182,212,.2));
  border:1px solid rgba(124,106,247,.35);color:#c4b5fd;border-radius:var(--r3);
  cursor:pointer;transition:all .22s;letter-spacing:.2px;
}
#start-btn:hover{
  background:linear-gradient(135deg,rgba(124,106,247,.42),rgba(6,182,212,.28));
  border-color:rgba(124,106,247,.55);
  box-shadow:0 4px 20px rgba(124,106,247,.2);
  transform:translateY(-1px);
}
#start-btn:active{transform:translateY(0)}
#start-btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.form-err{font-size:11px;color:var(--rd);min-height:14px}
.session-list-hd{
  padding:12px 16px 6px;font-size:10px;font-weight:700;
  color:var(--mu2);text-transform:uppercase;letter-spacing:1px;flex-shrink:0;
}
#session-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent;padding:4px 0}
.sess-item{
  padding:9px 14px 9px 30px;cursor:pointer;transition:background .15s;
  position:relative;border-radius:0;margin:1px 6px;border-radius:10px;
}
.sess-item:hover{background:var(--s2)}
.sess-item.active{background:rgba(124,106,247,.1);box-shadow:inset 0 0 0 1px rgba(124,106,247,.2)}
.sess-item.drag-over-top{box-shadow:inset 0 2px 0 var(--ac)}
.sess-item.drag-over-bottom{box-shadow:inset 0 -2px 0 var(--ac)}
.sess-item.dragging{opacity:.35}
.sess-drag-handle{
  position:absolute;left:9px;top:50%;transform:translateY(-50%);
  color:var(--mu);opacity:0;cursor:grab;font-size:13px;line-height:1;
  user-select:none;transition:opacity .15s;
}
.sess-item:hover .sess-drag-handle{opacity:.4}
.sess-drag-handle:hover{opacity:.8 !important}
.sess-actions{display:none;position:absolute;top:50%;right:8px;transform:translateY(-50%);gap:2px;align-items:center}
.sess-item:hover .sess-actions{display:flex}
.sess-del,.sess-restart{
  background:none;border:none;cursor:pointer;font-size:12px;
  line-height:1;padding:3px 6px;border-radius:6px;transition:all .15s;color:var(--mu);
}
.sess-del:hover{color:var(--rd);background:rgba(239,68,68,.12)}
.sess-restart:hover{color:var(--gn);background:rgba(34,197,94,.12)}
.sess-platform{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu2);margin-bottom:2px}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pdot.tiktok{background:#ff2d55}.pdot.douyin{background:#00f2ea}
.sess-name{font-weight:600;font-size:13px;cursor:text;color:var(--tx2);line-height:1.3}
.sess-item.active .sess-name{color:var(--tx)}
.sess-name-edit{
  background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.4);color:var(--tx);
  border-radius:5px;padding:1px 6px;font-size:13px;font-weight:600;width:calc(100% - 8px);outline:none;
}
.sess-meta{font-size:10px;color:var(--mu);margin-top:2px}
.sess-status{
  display:inline-block;padding:2px 7px;border-radius:100px;font-size:10px;
  margin-top:3px;font-weight:500;letter-spacing:.2px;
}
.ss-live{background:rgba(34,197,94,.1);color:var(--gn);border:1px solid rgba(34,197,94,.2)}
.ss-ended{background:rgba(100,116,139,.08);color:var(--mu2);border:1px solid rgba(100,116,139,.15)}

/* ── MAIN ── */
main{display:flex;flex-direction:column;overflow:hidden;min-height:0}
#empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:16px;color:var(--mu);font-size:14px;
}
#empty-state svg{opacity:.15}
#empty-state p{color:var(--mu2);font-size:13px;letter-spacing:.2px}

/* ── 统计卡片 ── */
.stats-row{
  display:grid;grid-template-columns:repeat(5,1fr);gap:10px;
  padding:14px 16px;flex-shrink:0;border-bottom:1px solid var(--bd);
}
.stat-card{
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);
  padding:11px 14px;transition:border-color .2s,background .2s;
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;
  border-radius:inherit;
}
.sc1::before{background:linear-gradient(135deg,rgba(124,106,247,.06),transparent)}
.sc2::before{background:linear-gradient(135deg,rgba(249,115,22,.06),transparent)}
.sc3::before{background:linear-gradient(135deg,rgba(239,68,68,.06),transparent)}
.sc4::before{background:linear-gradient(135deg,rgba(6,182,212,.06),transparent)}
.stat-card:hover::before{opacity:1}
.stat-card:hover{border-color:var(--bd2)}
.stat-lbl{font-size:11px;color:var(--mu2);margin-bottom:5px;font-weight:500}
.stat-val{font-size:24px;font-weight:700;line-height:1;letter-spacing:-.5px}
.sc0 .stat-val{color:var(--tx)}
.sc1 .stat-val{color:var(--ac2)}
.sc2 .stat-val{color:var(--or)}
.sc3 .stat-val{color:var(--rd)}
.sc4 .stat-val{color:var(--cy)}

/* ── 内容区 ── */
.content-area{
  flex:1;display:grid;grid-template-columns:1fr 280px;
  grid-template-rows:1fr 185px;min-height:0;overflow:hidden;
}
.msg-panel{grid-row:1/3;display:flex;flex-direction:column;border-right:1px solid var(--bd);overflow:hidden}
.panel-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;border-bottom:1px solid var(--bd);flex-shrink:0;gap:8px;
  background:rgba(8,11,20,.4);
}
.panel-title{font-size:11px;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:.7px;white-space:nowrap}
.panel-hdr-right{display:flex;align-items:center;gap:6px}

/* ── iOS Segmented Control ── */
.type-tabs{
  display:flex;gap:2px;
  background:rgba(0,0,0,.25);
  border:1px solid var(--bd);
  border-radius:8px;padding:2px;
}
.ttab{
  padding:3px 10px;border-radius:6px;font-size:12px;cursor:pointer;
  background:transparent;border:none;color:var(--mu2);transition:all .15s;
  font-weight:500;
}
.ttab:hover{color:var(--tx)}
.ttab.on{
  background:rgba(255,255,255,.12);color:var(--tx);
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}

/* 翻译切换 */
.translate-toggle{
  display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;
  font-size:12px;cursor:pointer;background:transparent;
  border:1px solid var(--bd);color:var(--mu2);transition:all .2s;white-space:nowrap;font-weight:500;
}
.translate-toggle:hover{border-color:var(--cy);color:var(--cy)}
.translate-toggle.on{
  background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.35);color:var(--cy);
}
.tl-dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
.translate-toggle.on .tl-dot{opacity:1;box-shadow:0 0 6px var(--cy)}

/* ── 消息流 ── */
#msg-feed{flex:1;overflow-y:auto;padding:6px 0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.05) transparent}
.msg-row{
  display:flex;align-items:baseline;gap:7px;padding:5px 14px;
  transition:background .1s;animation:fi .2s ease;flex-wrap:wrap;
  border-radius:0;
}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-row:hover{background:var(--s1)}
.msg-ts{font-size:11px;color:var(--mu);flex-shrink:0;width:50px;font-variant-numeric:tabular-nums}
.msg-user{
  font-size:12px;color:var(--cy);flex-shrink:0;max-width:96px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;
}
.msg-user-link{text-decoration:none;transition:color .15s}
.msg-user-link:hover{color:#67e8f9}
.msg-text{font-size:13px;color:var(--tx2);word-break:break-all;line-height:1.5}
.mbadge{font-size:10px;padding:2px 6px;border-radius:5px;flex-shrink:0;font-weight:600;letter-spacing:.2px}
.bg-gift{background:rgba(249,115,22,.12);color:var(--or);border:1px solid rgba(249,115,22,.2)}
.bg-like{background:rgba(239,68,68,.1);color:var(--rd);border:1px solid rgba(239,68,68,.18)}
.bg-enter{background:rgba(100,116,139,.1);color:var(--mu2);border:1px solid rgba(100,116,139,.18)}
.bg-sub{background:rgba(34,197,94,.1);color:var(--gn);border:1px solid rgba(34,197,94,.18)}
/* 翻译结果 */
.msg-tl{
  width:100%;padding-left:57px;font-size:12px;color:var(--mu2);
  border-left:2px solid rgba(6,182,212,.2);margin-top:2px;word-break:break-all;
  animation:fi .25s ease;
}
.msg-tl.loading{opacity:.35}
.msg-empty{padding:32px;text-align:center;color:var(--mu);font-size:13px}

/* ── 右侧面板 ── */
.right-top{border-bottom:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
#top-users{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.05) transparent}
.u-row{display:flex;align-items:center;gap:8px;padding:6px 14px;transition:background .1s}
.u-row:hover{background:var(--s1)}
.u-rank{font-size:11px;color:var(--mu);width:16px;text-align:right;flex-shrink:0}
.u-rank.gold{color:var(--yw);font-weight:700}
.u-body{flex:1;min-width:0}
.u-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;font-weight:500}
.u-bar-bg{height:2px;background:rgba(255,255,255,.06);border-radius:2px}
.u-bar{height:2px;border-radius:2px;background:linear-gradient(90deg,var(--ac),var(--cy));transition:width .5s}
.u-cnt{font-size:11px;color:var(--mu2);flex-shrink:0;font-variant-numeric:tabular-nums}
.right-bottom{display:flex;flex-direction:column;overflow:hidden}
#chart-wrap{flex:1;position:relative;padding:6px 10px 8px}

/* ── Session Header ── */
.session-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;gap:10px;
  background:rgba(8,11,20,.5);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.session-hdr-info{display:flex;align-items:center;gap:8px;min-width:0}
.session-hdr-name{font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.2px}
.session-hdr-meta{font-size:12px;color:var(--mu2);white-space:nowrap}

/* ── 视图切换（iOS Segmented Control 大号）── */
.view-tabs{
  display:flex;gap:2px;
  background:rgba(0,0,0,.3);
  border:1px solid var(--bd);
  border-radius:10px;padding:3px;
}
.view-tab{
  padding:5px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;
  background:transparent;border:none;color:var(--mu2);transition:all .18s;
  letter-spacing:.2px;
}
.view-tab:hover{color:var(--tx2)}
.view-tab.on{
  background:rgba(255,255,255,.12);color:var(--tx);
  box-shadow:0 2px 8px rgba(0,0,0,.35);
}

/* ── 模态框 ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:1000;align-items:center;justify-content:center;
}
.modal-overlay.on{display:flex}
.modal{
  background:rgba(22,28,45,.92);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.1);border-radius:20px;
  width:480px;max-width:95vw;overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.04);
}
.modal-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid var(--bd);
}
.modal-title{font-size:16px;font-weight:700;letter-spacing:-.2px}
.modal-close{
  background:rgba(255,255,255,.06);border:none;color:var(--mu2);cursor:pointer;
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .15s;
}
.modal-close:hover{background:rgba(255,255,255,.12);color:var(--tx)}
.modal-body{padding:22px;display:flex;flex-direction:column;gap:16px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px;align-items:center}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:12px;color:var(--mu2);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%}
.field-hint{font-size:11px;color:var(--mu);margin-top:2px;line-height:1.5}
.save-btn{
  padding:8px 22px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;
  background:linear-gradient(135deg,rgba(124,106,247,.4),rgba(6,182,212,.25));
  border:1px solid rgba(124,106,247,.45);color:#c4b5fd;transition:all .2s;
  letter-spacing:.3px;
}
.save-btn:hover{
  background:linear-gradient(135deg,rgba(124,106,247,.55),rgba(6,182,212,.35));
  box-shadow:0 4px 16px rgba(124,106,247,.25);transform:translateY(-1px);
}
.save-btn:active{transform:translateY(0)}
.cancel-btn{
  padding:8px 18px;border-radius:100px;font-size:13px;cursor:pointer;
  background:transparent;border:1px solid var(--bd);color:var(--mu2);transition:all .2s;
}
.cancel-btn:hover{border-color:var(--bd2);color:var(--tx)}
.save-msg{font-size:12px;color:var(--gn);align-self:center;margin-right:auto;font-weight:500}
.key-status{display:inline-flex;align-items:center;gap:5px;font-size:12px;margin-top:2px}
.key-status.set{color:var(--gn)}.key-status.unset{color:var(--mu)}

/* ── 数据表格 ── */
#data-view{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.data-toolbar{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap;
  background:rgba(8,11,20,.4);
}
.data-search{
  background:rgba(255,255,255,.05);border:1px solid var(--bd);color:var(--tx);
  border-radius:100px;padding:6px 14px;font-size:13px;outline:none;width:200px;transition:all .2s;
}
.data-search:focus{border-color:rgba(124,106,247,.5);box-shadow:0 0 0 3px rgba(124,106,247,.1)}
.dt-wrap{flex:1;overflow:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.05) transparent}
.dt{width:100%;border-collapse:collapse;font-size:13px}
.dt th{
  position:sticky;top:0;background:rgba(13,16,32,.95);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:9px 14px;text-align:left;
  font-size:10px;font-weight:700;color:var(--mu2);text-transform:uppercase;
  letter-spacing:.7px;border-bottom:1px solid var(--bd);white-space:nowrap;
}
.dt td{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top}
.dt tr:hover td{background:rgba(255,255,255,.025)}
.dt-id{color:var(--mu);font-size:11px;font-family:monospace}
.dt-ts{color:var(--mu2);font-size:12px;white-space:nowrap;font-variant-numeric:tabular-nums}
.dt-user{color:var(--cy);font-size:12px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dt-content{max-width:360px;word-break:break-all;line-height:1.5;color:var(--tx2)}
.dt-extra{font-family:monospace;font-size:11px;color:var(--mu);max-width:180px;word-break:break-all;line-height:1.4}
.dt-empty{padding:48px;text-align:center;color:var(--mu)}
/* 分页 */
.data-pager{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-top:1px solid var(--bd);flex-shrink:0;gap:8px;
  background:rgba(8,11,20,.4);
}
.pager-info{font-size:12px;color:var(--mu2)}
.pager-btns{display:flex;gap:4px}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* 欢迎屏 */

<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">◈ LiveScope</div>
  <div class="hdr-right">
    <div id="live-badge"><span class="dot-live"></span>采集中</div>
    <button class="btn btn-icon" onclick="openSettings()" title="设置" style="font-size:16px">⚙</button>
    <button class="btn" onclick="refreshAll()" style="font-size:13px;display:flex;align-items:center;gap:5px">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      刷新
    </button>
  </div>
</header>

<!-- ── 主体 ── -->
<div class="layout">

  <!-- 侧边栏 -->
  <aside>
    <div class="aside-hd">开始采集</div>
    <div class="collect-form">
      <select id="f-platform" onchange="updateTargetPlaceholder()">
        <option value="tiktok">TikTok</option>
        <option value="douyin">抖音</option>
      </select>
      <input id="f-target" type="text" placeholder="@username"/>
      <div class="form-err" id="form-err"></div>
      <button id="start-btn" onclick="startCollect()">开始采集</button>
    </div>
    <div class="session-list-hd">历史会话</div>
    <div id="session-list"><div class="msg-empty" style="padding:20px;font-size:13px;color:var(--mu);text-align:center">加载中…</div></div>
  </aside>

  <!-- 主区域 -->
  <main id="main">
    <div id="empty-state">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="18" height="18" rx="4" stroke="currentColor" stroke-width="1.2"/>
        <path d="M9 9h6M9 12h6M9 15h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <p>← 选择会话，或输入主播信息开始采集</p>
    </div>
  </main>

</div>

<!-- ── 设置模态框 ── -->
<div class="modal-overlay" id="settings-modal" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title">⚙️ 模型接入设置</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">

      <div class="field">
        <label>抖音 Cookie <span style="font-weight:400;color:var(--mu2);font-size:12px">（抖音采集必填）</span></label>
        <textarea id="set-douyin-cookie" rows="3"
          placeholder="ttwid=xxx; __ac_nonce=xxx; sessionid=xxx; passport_csrf_token=xxx"
          style="resize:vertical;font-size:12px;font-family:monospace"></textarea>
        <div id="set-douyin-cookie-status" class="key-status unset">未设置</div>
        <div class="field-hint">
          Chrome → 登录抖音 → F12 → Application → Cookies → douyin.com，
          复制 <code style="background:rgba(255,255,255,.07);padding:1px 4px;border-radius:3px">ttwid</code>、
          <code style="background:rgba(255,255,255,.07);padding:1px 4px;border-radius:3px">sessionid</code>
          等字段拼成一行
        </div>
      </div>

      <div class="field">
        <label>EulerStream API Key <span style="font-weight:400;color:var(--mu2);font-size:12px">（TikTok 采集必填）</span></label>
        <input id="set-euler-key" type="password" placeholder="es-…"/>
        <div id="set-euler-key-status" class="key-status unset">未设置</div>
        <div class="field-hint">免费注册：<a href="https://www.eulerstream.com/pricing" target="_blank"
          style="color:var(--cy)">eulerstream.com/pricing</a>，解除 TikTok 连接速率限制</div>
      </div>

      <div class="field">
        <label>OpenRouter API Key <span style="font-weight:400;color:var(--mu2);font-size:12px">（弹幕翻译必填）</span></label>
        <input id="set-key" type="password" placeholder="sk-or-v1-…"/>
        <div id="set-key-status" class="key-status unset">未设置</div>
        <div class="field-hint">前往 <a href="https://openrouter.ai/keys" target="_blank"
          style="color:var(--cy)">openrouter.ai/keys</a> 获取 API Key</div>
      </div>

      <div class="field">
        <label>翻译模型</label>
        <select id="set-model-select" onchange="onModelSelectChange(this.value)">
          <option value="openai/gpt-4o-mini">GPT-4o Mini（推荐，快速经济）</option>
          <option value="openai/gpt-4o">GPT-4o（高质量）</option>
          <option value="anthropic/claude-haiku-3-5">Claude Haiku 3.5（速度极快）</option>
          <option value="google/gemini-flash-1.5">Gemini Flash 1.5（经济快速）</option>
          <option value="deepseek/deepseek-chat">DeepSeek V3（中文友好）</option>
          <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B（中文优秀）</option>
          <option value="__custom__">自定义模型名…</option>
        </select>
        <input id="set-model-custom" type="text" placeholder="输入完整模型 ID，如 meta-llama/llama-3.1-8b-instruct"
               style="display:none;margin-top:6px"/>
        <div class="field-hint">
          查看全部可用模型：<a href="https://openrouter.ai/models" target="_blank"
          style="color:var(--cy)">openrouter.ai/models</a>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <span class="save-msg" id="set-save-msg"></span>
      <button class="cancel-btn" onclick="closeSettings()">取消</button>
      <button class="save-btn" onclick="saveSettings()">保存设置</button>
    </div>
  </div>
</div>

<script>
// ── 模型选择联动 ──────────────────────────────────────────────────────────────
function onModelSelectChange(val){
  $('set-model-custom').style.display = val === '__custom__' ? 'block' : 'none';
}

function getSelectedModel(){
  const sel = $('set-model-select');
  return sel.value === '__custom__'
    ? $('set-model-custom').value.trim()
    : sel.value;
}

function setModelUI(model){
  const sel = $('set-model-select');
  const opt = Array.from(sel.options).find(o => o.value === model);
  if(opt){
    sel.value = model;
    $('set-model-custom').style.display = 'none';
  } else {
    sel.value = '__custom__';
    $('set-model-custom').style.display = 'block';
    $('set-model-custom').value = model;
  }
}

// ── 全局状态 ──────────────────────────────────────────────────────────────────
let curSession    = null;
let curType       = 'chat';
let pollTimer     = null;
let lastMsgId     = 0;
let autoScroll    = true;
let chart         = null;
let translateOn   = false;
let translateQueue = [];   // [{id, el}] 等待翻译的消息
let translateTimer = null;

// ── 工具 ──────────────────────────────────────────────────────────────────────
const $   = id => document.getElementById(id);
const esc = s  => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = n  => n>=10000?(n/10000).toFixed(1)+'w':n>=1000?(n/1000).toFixed(1)+'k':String(n||0);
async function api(url, opts){ const r=await fetch(url,opts); return r.json(); }

// ── 设置面板 ──────────────────────────────────────────────────────────────────
async function openSettings(){
  const s = await api('/api/settings');

  // Douyin Cookie
  $('set-douyin-cookie').value = '';
  $('set-douyin-cookie').placeholder = s.douyin_cookie_set
    ? '（已设置，输入新值可覆盖）'
    : 'ttwid=xxx; __ac_nonce=xxx; sessionid=xxx; passport_csrf_token=xxx';
  const douyinCookieEl = $('set-douyin-cookie-status');
  if(s.douyin_cookie_set){
    douyinCookieEl.className = 'key-status set';
    douyinCookieEl.textContent = `✓ 已设置  ${s.douyin_cookie_masked}`;
  } else {
    douyinCookieEl.className = 'key-status unset';
    douyinCookieEl.textContent = '未设置';
  }

  // EulerStream Key
  $('set-euler-key').value = '';
  $('set-euler-key').placeholder = s.eulerstream_api_key_set ? '（已设置，输入新值可覆盖）' : 'es-…';
  const eulerEl = $('set-euler-key-status');
  if(s.eulerstream_api_key_set){
    eulerEl.className = 'key-status set';
    eulerEl.textContent = `✓ 已设置  ${s.eulerstream_api_key_masked}`;
  } else {
    eulerEl.className = 'key-status unset';
    eulerEl.textContent = '未设置';
  }

  // OpenRouter Key
  $('set-key').value = '';
  $('set-key').placeholder = s.openrouter_api_key_set ? '（已设置，输入新值可覆盖）' : 'sk-or-v1-…';
  setModelUI(s.openrouter_model || 'openai/gpt-4o-mini');
  const statusEl = $('set-key-status');
  if(s.openrouter_api_key_set){
    statusEl.className = 'key-status set';
    statusEl.textContent = `✓ 已设置  ${s.openrouter_api_key_masked}`;
  } else {
    statusEl.className = 'key-status unset';
    statusEl.textContent = '未设置';
  }

  $('set-save-msg').textContent = '';
  $('settings-modal').classList.add('on');
}

function closeSettings(){ $('settings-modal').classList.remove('on'); }

async function saveSettings(){
  const douyinCookie = $('set-douyin-cookie').value.trim();
  const eulerKey     = $('set-euler-key').value.trim();
  const key          = $('set-key').value.trim();
  const model        = getSelectedModel();
  if(!model){ $('set-save-msg').style.color='var(--rd)'; $('set-save-msg').textContent='模型名不能为空'; return; }

  const params = new URLSearchParams({ openrouter_model: model });
  if(douyinCookie) params.append('douyin_cookie', douyinCookie);
  if(eulerKey)     params.append('eulerstream_api_key', eulerKey);
  if(key)          params.append('openrouter_api_key', key);

  const res = await api(`/api/settings?${params}`, { method:'POST' });
  if(res.status === 'saved'){
    $('set-save-msg').style.color = 'var(--gn)';
    $('set-save-msg').textContent = '✓ 已保存';
    if(douyinCookie){
      $('set-douyin-cookie').value = '';
      $('set-douyin-cookie').placeholder = '（已设置，输入新值可覆盖）';
      $('set-douyin-cookie-status').className = 'key-status set';
      $('set-douyin-cookie-status').textContent = '✓ 已更新';
    }
    if(eulerKey){
      $('set-euler-key').value = '';
      $('set-euler-key').placeholder = '（已设置，输入新值可覆盖）';
      $('set-euler-key-status').className = 'key-status set';
      $('set-euler-key-status').textContent = '✓ 已更新';
    }
    if(key){
      $('set-key').value = '';
      $('set-key').placeholder = '（已设置，输入新值可覆盖）';
      $('set-key-status').className = 'key-status set';
      $('set-key-status').textContent = '✓ 已更新';
    }
    setTimeout(closeSettings, 1200);
  }
}

// ── 翻译控制 ──────────────────────────────────────────────────────────────────
function toggleTranslate(){
  translateOn = !translateOn;
  const btn = $('translate-btn');
  btn.classList.toggle('on', translateOn);

  if(translateOn){
    // 对已有弹幕追加翻译占位
    document.querySelectorAll('#msg-feed .msg-row[data-mid]').forEach(row=>{
      if(!row.querySelector('.msg-tl')){
        const content = row.querySelector('.msg-text')?.textContent;
        if(content) enqueueTranslate(row.dataset.mid, row, content);
      }
    });
    startTranslateTimer();
  } else {
    stopTranslateTimer();
    // 移除所有翻译行
    document.querySelectorAll('#msg-feed .msg-tl').forEach(el=>el.remove());
    translateQueue = [];
  }
}

function enqueueTranslate(mid, row, text){
  if(!text || !text.trim()) return;
  // 插入 loading 占位
  let tl = row.querySelector('.msg-tl');
  if(!tl){
    tl = document.createElement('div');
    tl.className = 'msg-tl loading';
    tl.textContent = '翻译中…';
    row.appendChild(tl);
  }
  translateQueue.push({ mid, el: tl, text });
}

function startTranslateTimer(){
  if(translateTimer) return;
  translateTimer = setInterval(flushTranslateQueue, 2500);
  flushTranslateQueue(); // 立即执行一次
}
function stopTranslateTimer(){
  clearInterval(translateTimer);
  translateTimer = null;
}

async function flushTranslateQueue(){
  if(!translateQueue.length) return;
  // 取出最多 20 条
  const batch = translateQueue.splice(0, 20);
  const texts = batch.map(b=>b.text);
  try{
    const res = await api('/api/translate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({texts})
    });
    if(res.error){
      batch.forEach(b=>{ if(b.el){ b.el.textContent='['+res.error+']'; b.el.classList.remove('loading'); }});
      return;
    }
    const tls = res.translations || [];
    batch.forEach((b,i)=>{
      if(b.el && b.el.isConnected){
        b.el.classList.remove('loading');
        b.el.textContent = tls[i] || '';
        if(!tls[i]) b.el.remove();
      }
    });
  } catch(e){
    batch.forEach(b=>{ if(b.el) b.el.textContent=''; });
  }
}

// ── 采集控制 ──────────────────────────────────────────────────────────────────
async function startCollect(){
  const platform = $('f-platform').value;
  const target   = $('f-target').value.trim();
  const errEl    = $('form-err');
  errEl.textContent = '';
  if(!target){ errEl.textContent='请输入用户名或 room_id'; return; }

  const btn = $('start-btn');
  btn.disabled=true; btn.textContent='连接中…';
  try{
    let url = `/api/collect/start?platform=${encodeURIComponent(platform)}&target=${encodeURIComponent(target)}`;
    const res = await api(url, {method:'POST'});
    if(res.error){
      errEl.textContent = res.error;
      if(res.error.includes('room_id') && platform==='douyin'){
        errEl.textContent += '  →  请直接输入直播间数字 ID（如：123456789）';
      }
      return;
    }
    $('f-target').value='';
    await loadSessions();
    const sessions=await api('/api/sessions');
    const found=sessions.find(s=>s.id===res.session_id);
    if(found) await selectSession(found);
  } catch(e){ errEl.textContent='连接失败，请检查网络'; }
  finally{ btn.disabled=false; btn.textContent='▶ 开始采集'; }
}

async function stopCollect(sessionId){
  if(!confirm('确定停止该直播间的采集？')) return;
  await api(`/api/collect/stop?session_id=${encodeURIComponent(sessionId)}`,{method:'POST'});
  await loadSessions();
  if(curSession?.id===sessionId){
    curSession.status='ended';
    clearInterval(pollTimer);
    $('live-badge').classList.remove('on');
    $('stop-btn')?.remove();
  }
}

// ── localStorage 排序 & 命名 ──────────────────────────────────────────────────
function getSessOrder(){ try{return JSON.parse(localStorage.getItem('ls_order')||'[]')}catch{return[]} }
function saveSessOrder(ids){ localStorage.setItem('ls_order',JSON.stringify(ids)) }
function getSessNames(){ try{return JSON.parse(localStorage.getItem('ls_names')||'{}')}catch{return{}} }
function saveSessName(id,name){ const n=getSessNames(); if(name)n[id]=name; else delete n[id]; localStorage.setItem('ls_names',JSON.stringify(n)) }

let _sessCache = {};   // id → session 对象
let _dragSrcId  = null;
let _wasDragging = false;

// ── 会话列表 ──────────────────────────────────────────────────────────────────
async function loadSessions(){
  const sessions = await api('/api/sessions');
  _sessCache = Object.fromEntries(sessions.map(s=>[s.id, s]));

  const el = $('session-list');
  $('live-badge').classList.toggle('on', sessions.some(s=>s.status==='live'));
  if(!sessions.length){ el.innerHTML='<div class="msg-empty">暂无会话</div>'; return; }

  // 按 localStorage 排序，新会话插到最前
  const order = getSessOrder();
  const newIds = sessions.filter(s=>!order.includes(s.id)).map(s=>s.id);
  if(newIds.length) saveSessOrder([...newIds, ...order]);
  const finalOrder = [...newIds, ...order];
  const sorted = [...sessions].sort((a,b)=>finalOrder.indexOf(a.id)-finalOrder.indexOf(b.id));

  const names = getSessNames();
  el.innerHTML = sorted.map(s=>`
    <div class="sess-item ${curSession?.id===s.id?'active':''}" data-sid="${esc(s.id)}">
      <span class="sess-drag-handle" title="拖动排序">⠿</span>
      <div class="sess-platform">
        <span class="pdot ${s.platform}"></span>
        ${s.platform==='tiktok'?'TikTok':'抖音'}
      </div>
      <div class="sess-name" data-orig="${esc(s.streamer_id)}" title="双击重命名">
        ${esc(names[s.id] || s.streamer_id)}
      </div>
      <div class="sess-meta">${s.started_at||''}</div>
      <span class="sess-status ${s.status==='live'?'ss-live':'ss-ended'}">
        ${s.status==='live'?'● 采集中':'已结束'}
      </span>
      ${s.status!=='live'?`<div class="sess-actions">
        <button class="sess-restart" title="重新采集">▶</button>
        <button class="sess-del" title="删除会话">✕</button>
      </div>`:''}
    </div>`).join('');

  // 绑定事件
  el.querySelectorAll('.sess-item').forEach(item=>{
    const sid = item.dataset.sid;

    // 点击选中（拖拽结束后忽略）
    item.addEventListener('click', e=>{
      if(_wasDragging){ _wasDragging=false; return; }
      if(e.target.closest('.sess-actions,.sess-drag-handle,.sess-name')) return;
      selectSession(_sessCache[sid]);
    });

    // 拖拽
    item.setAttribute('draggable','true');
    item.addEventListener('dragstart', e=>{
      _dragSrcId = sid; _wasDragging = false;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(()=>item.classList.add('dragging'), 0);
    });
    item.addEventListener('dragend', ()=>{
      item.classList.remove('dragging');
      el.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(x=>{
        x.classList.remove('drag-over-top','drag-over-bottom');
      });
      setTimeout(()=>{ _dragSrcId=null; }, 50);
    });
    item.addEventListener('dragover', e=>{
      e.preventDefault(); e.dataTransfer.dropEffect='move';
      _wasDragging = true;
      el.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(x=>{
        x.classList.remove('drag-over-top','drag-over-bottom');
      });
      if(sid !== _dragSrcId){
        const mid = item.getBoundingClientRect().top + item.offsetHeight / 2;
        item.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
      }
    });
    item.addEventListener('drop', e=>{
      e.preventDefault();
      if(!_dragSrcId || _dragSrcId===sid) return;
      const ids = [...el.querySelectorAll('.sess-item')].map(x=>x.dataset.sid);
      const si = ids.indexOf(_dragSrcId);
      ids.splice(si, 1);
      const ti = ids.indexOf(sid);
      const mid = item.getBoundingClientRect().top + item.offsetHeight / 2;
      const insertBefore = e.clientY < mid;
      ids.splice(insertBefore ? ti : ti + 1, 0, _dragSrcId);
      saveSessOrder(ids);
      loadSessions();
    });

    // 双击重命名
    const nameEl = item.querySelector('.sess-name');
    nameEl.addEventListener('click', e=>e.stopPropagation());
    nameEl.addEventListener('dblclick', e=>{ e.stopPropagation(); startRename(nameEl, sid); });

    // 操作按钮
    item.querySelector('.sess-restart')?.addEventListener('click', e=>{ e.stopPropagation(); restartSession(_sessCache[sid]); });
    item.querySelector('.sess-del')?.addEventListener('click', e=>{ e.stopPropagation(); deleteSession(sid); });
  });
}

function startRename(nameEl, sid){
  const input = document.createElement('input');
  input.className = 'sess-name-edit';
  input.value = getSessNames()[sid] || '';
  input.placeholder = nameEl.dataset.orig || '';
  nameEl.replaceWith(input);
  input.focus(); input.select();
  let done = false;
  function save(){
    if(done) return; done = true;
    saveSessName(sid, input.value.trim());
    loadSessions();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); save(); }
    if(e.key==='Escape'){ done=true; loadSessions(); }
  });
}

// ── 删除会话 ──────────────────────────────────────────────────────────────────
async function deleteSession(sessionId){
  if(!confirm('确定删除该会话及其所有消息记录？此操作不可撤销。')) return;
  const res = await api(`/api/sessions?session_id=${encodeURIComponent(sessionId)}`, {method:'DELETE'});
  if(res.error){ alert(res.error); return; }
  if(curSession?.id === sessionId){
    curSession = null;
    clearInterval(pollTimer);
    if(chart){ chart.destroy(); chart=null; }
    $('main').innerHTML = `<div id="empty-state">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="18" height="18" rx="4" stroke="currentColor" stroke-width="1.2"/>
        <path d="M9 9h6M9 12h6M9 15h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <p>← 选择会话，或输入主播信息开始采集</p>
    </div>`;
  }
  await loadSessions();
}

// ── 重新采集 ──────────────────────────────────────────────────────────────────
async function restartSession(s){
  const res = await api(
    `/api/collect/resume?session_id=${encodeURIComponent(s.id)}`,
    {method:'POST'}
  );
  if(res.error){ alert(res.error); return; }
  await loadSessions();
  // 选中原会话（状态已更新为 live）
  const sessions = await api('/api/sessions');
  const same = sessions.find(x => x.id === s.id);
  if(same) await selectSession(same);
}

// ── 选中会话 ──────────────────────────────────────────────────────────────────
async function selectSession(s){
  curSession=s; curType='chat'; lastMsgId=0; autoScroll=true;
  translateOn=false; translateQueue=[];
  curView='dashboard'; dtPage0=0; dtType='all'; dtSearchKw='';
  aiStreaming=false;
  aiHistory = loadAiHistory();   // 从 localStorage 恢复该会话的对话历史
  clearInterval(pollTimer); stopTranslateTimer();
  if(chart){ chart.destroy(); chart=null; }
  renderFrame(s);
  await Promise.all([loadStats(), loadMessages(true)]);
  if(s.status==='live'){
    pollTimer=setInterval(async()=>{ await pollNewMessages(); await loadStats(); },2500);
  }
}

// ── 统计 ──────────────────────────────────────────────────────────────────────
async function loadStats(){
  if(!curSession) return;
  const stats=await api(`/api/sessions/${curSession.id}/stats`);
  const c=stats.counts||{};
  const set=(id,v)=>{ const el=$(id); if(el) el.textContent=fmt(v); };
  set('s-total',stats.total); set('s-chat',c.chat);
  set('s-gift',c.gift); set('s-like',c.like); set('s-enter',c.enter);
  renderTopUsers(stats.top_users||[]);
  renderChart(stats.timeline||[]);
}

function profileUrl(username, userId){
  if(!curSession) return null;
  if(curSession.platform==='tiktok')
    return username ? `https://www.tiktok.com/@${encodeURIComponent(username)}` : null;
  return userId  ? `https://www.douyin.com/user/${encodeURIComponent(userId)}` : null;
}

function renderTopUsers(users){
  const el=$('top-users');
  if(!el) return;
  if(!users.length){ el.innerHTML='<div class="msg-empty">暂无弹幕数据</div>'; return; }
  const max=users[0]?.count||1;
  el.innerHTML=users.map((u,i)=>{
    const url=profileUrl(u.username,u.user_id);
    const nameEl=url
      ? `<a class="u-name msg-user-link" href="${url}" target="_blank" rel="noopener">${esc(u.username||'匿名')}</a>`
      : `<div class="u-name">${esc(u.username||'匿名')}</div>`;
    return `<div class="u-row">
      <span class="u-rank ${i<3?'gold':''}">${i+1}</span>
      <div class="u-body">${nameEl}
        <div class="u-bar-bg"><div class="u-bar" style="width:${Math.round(u.count/max*100)}%"></div></div>
      </div>
      <span class="u-cnt">${u.count}</span>
    </div>`;
  }).join('');
}

function renderChart(tl){
  const canvas=$('tc'); if(!canvas) return;
  const labels=tl.map(t=>t.minute), data=tl.map(t=>t.count);
  if(chart){ chart.data.labels=labels; chart.data.datasets[0].data=data; chart.update('none'); return; }
  chart=new Chart(canvas,{type:'bar',
    data:{labels,datasets:[{data,
      backgroundColor:'rgba(124,106,247,.3)',

// ── 消息 ──────────────────────────────────────────────────────────────────────
async function loadMessages(reset=false){
  if(!curSession) return;
  const feed=$('msg-feed'); if(!feed) return;
  if(reset){ feed.innerHTML=''; lastMsgId=0; }
  const msgs=await api(`/api/sessions/${curSession.id}/messages?type=${curType}&limit=300`);
  if(!msgs.length){ if(reset) feed.innerHTML='<div class="msg-empty">暂无消息</div>'; return; }
  appendMsgs(msgs, reset);
  lastMsgId=msgs[msgs.length-1].id;
}

async function pollNewMessages(){
  if(!curSession||!lastMsgId) return;
  const feed=$('msg-feed'); if(!feed) return;
  const msgs=await api(`/api/sessions/${curSession.id}/messages?type=${curType}&since_id=${lastMsgId}&limit=300`);
  if(!msgs.length) return;
  appendMsgs(msgs,false);
  lastMsgId=msgs[msgs.length-1].id;
}

function appendMsgs(msgs, reset){
  const feed=$('msg-feed'); if(!feed) return;
  feed.querySelector('.msg-empty')?.remove();
  const frag=document.createDocumentFragment();
  msgs.forEach(m=>{
    const div=document.createElement('div');
    div.className=`msg-row msg-${m.msg_type}`;
    div.dataset.mid=m.id;
    let badge='', text=esc(m.content||'');
    if(m.msg_type==='gift')     badge=`<span class="mbadge bg-gift">礼物</span>`;
    if(m.msg_type==='like')   { badge=`<span class="mbadge bg-like">点赞</span>`; text=''; }
    if(m.msg_type==='enter')  { badge=`<span class="mbadge bg-enter">进场</span>`; text=''; }
    if(m.msg_type==='subscribe'){badge=`<span class="mbadge bg-sub">关注</span>`; text=''; }

    const url=profileUrl(m.username, m.user_id);
    const userEl=url
      ? `<a class="msg-user msg-user-link" href="${url}" target="_blank" rel="noopener">${esc(m.username||'匿名')}</a>`
      : `<span class="msg-user">${esc(m.username||'匿名')}</span>`;

    div.innerHTML=`
      <span class="msg-ts">${m.timestamp}</span>
      ${badge}${userEl}
      ${text?`<span class="msg-text">${text}</span>`:''}`;

    // 如果翻译已开启，立即加入翻译队列
    if(translateOn && m.msg_type==='chat' && m.content?.trim()){
      const tl=document.createElement('div');
      tl.className='msg-tl loading';
      tl.textContent='翻译中…';
      div.appendChild(tl);
      translateQueue.push({mid:m.id, el:tl, text:m.content});
    }
    frag.appendChild(div);
  });
  feed.appendChild(frag);
  if(autoScroll) feed.scrollTop=feed.scrollHeight;
}

const DT_PAGE = 150;
let dtPage0    = 0;   // 当前页码（0-indexed）
let dtType     = 'all';
let dtSearchKw = '';
let dtTotal    = 0;

const DT_TYPE_LABEL = {chat:'弹幕',gift:'礼物',like:'点赞',enter:'进场',subscribe:'关注'};
const DT_TYPE_COLOR = {
  chat:'color:var(--ac)',gift:'color:var(--or)',
  like:'color:var(--rd)',enter:'color:var(--mu)',subscribe:'color:var(--gn)'
};

async function loadDataTable(){
  if(!curSession) return;
  const tbody = $('dt-body'); if(!tbody) return;
  tbody.innerHTML='<tr><td colspan="6" class="dt-empty">加载中…</td></tr>';

  const offset = dtPage0*DT_PAGE;
  let url=`/api/sessions/${curSession.id}/messages?type=${dtType}&limit=${DT_PAGE}&offset=${offset}`;
  let rows = await api(url);

  // 客户端关键词过滤
  if(dtSearchKw){
    const kw=dtSearchKw.toLowerCase();
    rows=rows.filter(m=>(m.username||'').toLowerCase().includes(kw)||(m.content||'').toLowerCase().includes(kw));
  }

  if(!rows.length){
    tbody.innerHTML='<tr><td colspan="6" class="dt-empty">暂无数据</td></tr>';
    $('dt-pager-info').textContent='无结果';
    $('dt-prev').disabled=true; $('dt-next').disabled=true;
    return;
  }

  tbody.innerHTML=rows.map(m=>{
    const url=profileUrl(m.username,m.user_id);
    const userEl=url
      ?`<a href="${url}" target="_blank" rel="noopener" style="color:var(--cy);text-decoration:none">${esc(m.username||'匿名')}</a>`
      :esc(m.username||'匿名');
    const typeStyle=DT_TYPE_COLOR[m.msg_type]||'';
    const typeLabel=DT_TYPE_LABEL[m.msg_type]||m.msg_type;
    let extra='';
    if(m.extra){
      try{
        const obj=JSON.parse(m.extra);
        extra=Object.entries(obj).map(([k,v])=>`<span style="color:var(--mu)">${esc(k)}</span>: ${esc(String(v))}`).join('<br>');
      }catch{ extra=esc(m.extra); }
    }
    return `<tr>
      <td class="dt-id">${m.id}</td>
      <td class="dt-ts">${m.timestamp}</td>
      <td><span style="font-size:11px;font-weight:600;${typeStyle}">${typeLabel}</span></td>
      <td class="dt-user" title="${esc(m.username||'')}">${userEl}</td>
      <td class="dt-content">${esc(m.content||'')}</td>
      <td class="dt-extra">${extra}</td>
    </tr>`;
  }).join('');

  const from=offset+1, to=offset+rows.length;
  $('dt-pager-info').textContent=`第 ${from}–${to} 条`;
  $('dt-prev').disabled = dtPage0===0;
  $('dt-next').disabled = rows.length < DT_PAGE;
  // 重置滚动
  const wrap=$('dt-wrap'); if(wrap) wrap.scrollTop=0;
}

function dtSwitchType(type, btn){
  dtType=type; dtPage0=0;
  document.querySelectorAll('#data-view .ttab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  loadDataTable();
}

/** 触发浏览器下载，content 为字符串或 Blob */
function _download(filename, content, mime='text/plain'){
  const blob = content instanceof Blob ? content : new Blob([content], {type: mime});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

/** 导出当前数据视图（全量，遵循当前类型过滤）为 Markdown */
async function exportMarkdown(){
  if(!curSession){ alert('请先选择会话'); return; }
  const btn = document.querySelector('.export-btn[onclick="exportMarkdown()"]');
  const origText = btn.innerHTML;
  btn.textContent = '导出中…'; btn.disabled = true;

  try{
    // 拉全量（不分页，上限 20000 条）
    const msgs = await api(
      `/api/sessions/${curSession.id}/messages?type=${dtType}&limit=20000&offset=0`
    );
    const stats = await api(`/api/sessions/${curSession.id}/stats`);
    const c = stats.counts || {};
    const names = {chat:'弹幕',gift:'礼物',like:'点赞',enter:'进场',subscribe:'关注'};
    const now  = new Date().toLocaleString('zh-CN',{hour12:false});
    const platform = curSession.platform === 'tiktok' ? 'TikTok' : '抖音';
    const typeName = dtType === 'all' ? '全部' : (names[dtType] || dtType);

    // ── 标题 & 统计摘要 ──
    let md = `# ${platform} · ${curSession.streamer_id} 直播数据报告\n\n`;
    md += `> 导出时间：${now}  ·  会话 ID：\`${curSession.id}\`\n\n`;
    md += `## 统计摘要\n\n`;
    md += `| 指标 | 数量 |\n|------|------|\n`;
    md += `| 总消息 | ${stats.total || 0} |\n`;
    md += `| 弹幕 | ${c.chat || 0} |\n`;
    md += `| 礼物 | ${c.gift || 0} |\n`;
    md += `| 点赞 | ${c.like || 0} |\n`;
    md += `| 进场 | ${c.enter || 0} |\n`;

    // ── Top 用户 ──
    if(stats.top_users?.length){
      md += `\n## 弹幕 Top 用户\n\n| 排名 | 用户名 | 弹幕数 |\n|------|--------|--------|\n`;
      stats.top_users.forEach((u,i)=>{
        md += `| ${i+1} | ${u.username || '匿名'} | ${u.count} |\n`;
      });
    }

    // ── 消息列表 ──
    md += `\n## 消息列表（${typeName}，共 ${msgs.length} 条）\n\n`;
    md += `| 时间 | 类型 | 用户名 | 内容 |\n|------|------|--------|------|\n`;

    // 关键词过滤（与当前搜索框同步）
    let rows = msgs;
    if(dtSearchKw){
      const kw = dtSearchKw.toLowerCase();
      rows = msgs.filter(m =>
        (m.username||'').toLowerCase().includes(kw) ||
        (m.content||'').toLowerCase().includes(kw)
      );
    }

    rows.forEach(m=>{
      // 转义 Markdown 表格里的管道符
      const clean = s => String(s||'').replace(/\|/g,'｜').replace(/\n/g,' ');
      md += `| ${clean(m.timestamp)} | ${clean(names[m.msg_type]||m.msg_type)} | ${clean(m.username||'匿名')} | ${clean(m.content)} |\n`;
    });

    const safeName = (curSession.streamer_id||'export').replace(/[^\w\u4e00-\u9fa5-]/g,'_');
    _download(`${safeName}_${dtType}.md`, md, 'text/markdown;charset=utf-8');
  } finally {
    btn.innerHTML = origText; btn.disabled = false;
  }
}

/** 将弹幕活跃度时间线导出为自绘 SVG 矢量文件 */
async function exportSvg(){
  if(!curSession){ alert('请先选择会话'); return; }

  const stats = await api(`/api/sessions/${curSession.id}/stats`);
  const tl    = stats.timeline || [];

  if(!tl.length){ alert('暂无时间线数据'); return; }

  // ── 尺寸 & 布局 ──
  const W = 960, H = 360;
  const PAD = {top:32, right:24, bottom:52, left:52};
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top  - PAD.bottom;

  const labels = tl.map(t=>t.minute);
  const values = tl.map(t=>t.count);
  const maxVal = Math.max(...values, 1);
  const barW   = Math.max(2, Math.floor(chartW / labels.length) - 2);

  // ── 颜色 & 文字 ──
  const BG      = '#080b14';
  const BAR_F   = 'rgba(124,106,247,.45)';
  const BAR_S   = 'rgba(157,142,249,.8)';
  const AXIS_C  = '#94a3b8';
  const GRID_C  = 'rgba(255,255,255,.06)';
  const TEXT_C  = '#e2e8f0';
  const platform = curSession.platform === 'tiktok' ? 'TikTok' : '抖音';
  const title    = `${platform} · ${curSession.streamer_id} — 弹幕活跃度`;

  // ── Y 轴刻度 ──
  const yTickCount = 5;
  const yTicks = Array.from({length: yTickCount+1}, (_,i) => Math.round(maxVal * i / yTickCount));

  // ── 生成 SVG 元素 ──
  const bars = labels.map((lbl, i) => {
    const x = PAD.left + i * (chartW / labels.length) + (chartW / labels.length - barW) / 2;
    const bh = Math.max(1, Math.round(values[i] / maxVal * chartH));
    const y  = PAD.top + chartH - bh;
    return `<rect x="${x.toFixed(1)}" y="${y}" width="${barW}" height="${bh}"
      fill="${BAR_F}" stroke="${BAR_S}" stroke-width="0.8" rx="3"/>`;
  }).join('\n  ');

  // X 轴标签（每隔若干条显示一个）
  const step = Math.max(1, Math.ceil(labels.length / 10));
  const xLabels = labels.map((lbl, i) => {
    if(i % step !== 0) return '';
    const cx = PAD.left + (i + 0.5) * (chartW / labels.length);
    return `<text x="${cx.toFixed(1)}" y="${PAD.top + chartH + 18}" text-anchor="middle"
      font-size="10" fill="${AXIS_C}">${lbl}</text>`;
  }).join('\n  ');

  // Y 轴网格线 + 刻度
  const gridLines = yTicks.map(v => {
    const y = PAD.top + chartH - Math.round(v / maxVal * chartH);
    const fmt = v >= 10000 ? (v/10000).toFixed(1)+'w' : v >= 1000 ? (v/1000).toFixed(1)+'k' : String(v);
    return `<line x1="${PAD.left}" y1="${y}" x2="${PAD.left+chartW}" y2="${y}"
        stroke="${GRID_C}" stroke-width="1"/>
  <text x="${PAD.left-6}" y="${y+4}" text-anchor="end" font-size="10" fill="${AXIS_C}">${fmt}</text>`;
  }).join('\n  ');

  const now = new Date().toLocaleString('zh-CN',{hour12:false});

  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1020"/>
      <stop offset="100%" stop-color="${BG}"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="${W}" height="${H}" fill="url(#bg)" rx="12"/>
  <!-- 标题 -->
  <text x="${W/2}" y="22" text-anchor="middle" font-size="13" font-weight="700"
    fill="${TEXT_C}" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">${title}</text>
  <!-- 导出时间 -->
  <text x="${W-PAD.right}" y="22" text-anchor="end" font-size="10" fill="${AXIS_C}"
    font-family="-apple-system,BlinkMacSystemFont,sans-serif">${now}</text>
  <!-- 网格 & Y轴刻度 -->
  ${gridLines}
  <!-- 柱状图 -->
  ${bars}
  <!-- X轴标签 -->
  ${xLabels}
  <!-- 轴线 -->
  <line x1="${PAD.left}" y1="${PAD.top}" x2="${PAD.left}" y2="${PAD.top+chartH}"
    stroke="${AXIS_C}" stroke-width="1" opacity="0.4"/>
  <line x1="${PAD.left}" y1="${PAD.top+chartH}" x2="${PAD.left+chartW}" y2="${PAD.top+chartH}"
    stroke="${AXIS_C}" stroke-width="1" opacity="0.4"/>
</svg>`;

  const safeName = (curSession.streamer_id||'chart').replace(/[^\w\u4e00-\u9fa5-]/g,'_');
  _download(`${safeName}_活跃度.svg`, svg, 'image/svg+xml;charset=utf-8');
}

// ── AI Chat ────────────────────────────────────────────────────────────────────
let aiProviders  = {};
let aiHistory    = [];   // [{role:'user'|'assistant', content}]
let aiStreaming   = false;

// ── AI 对话历史持久化 ─────────────────────────────────────────────────────────
function aiHistoryKey(){ return curSession ? `ai_hist_${curSession.id}` : null; }
function loadAiHistory(){
  const k = aiHistoryKey(); if(!k) return [];
  try{ return JSON.parse(localStorage.getItem(k)||'[]'); } catch{ return []; }
}
function saveAiHistory(){
  const k = aiHistoryKey(); if(!k) return;
  // 只保留最近 60 条，防止 localStorage 超限
  const trimmed = aiHistory.slice(-60);
  localStorage.setItem(k, JSON.stringify(trimmed));
}
function clearAiHistory(){
  const k = aiHistoryKey(); if(k) localStorage.removeItem(k);
}

async function initAiView(){
  if(!Object.keys(aiProviders).length){
    aiProviders = await api('/api/analyze/providers').catch(()=>({}));
  }
  const provSel = $('ai-provider');
  if(provSel && provSel.options.length === 0){
    Object.entries(aiProviders).forEach(([id,p])=>{
      const o=document.createElement('option'); o.value=id; o.textContent=p.name; provSel.appendChild(o);
    });
  }
  const s = await api('/api/settings').catch(()=>({}));
  if(s.analyze_provider && $('ai-provider')) $('ai-provider').value = s.analyze_provider;
  if(s.analyze_api_key  && $('ai-apikey'))   $('ai-apikey').value  = s.analyze_api_key;
  const hint=$('ai-key-hint');
  if(hint) hint.textContent = s.analyze_api_key_set ? `✓ 已保存  ${s.analyze_api_key_masked}` : '';
  onAiProviderChange($('ai-provider')?.value||'deepseek', s.analyze_model);

  // 恢复历史对话到界面
  const msgs = $('ai-messages'); if(!msgs) return;
  if(aiHistory.length){
    msgs.innerHTML = '';
    aiHistory.forEach(m => aiAppendMsg(m.role, m.content));
    msgs.scrollTop = msgs.scrollHeight;
  }
}

function onAiProviderChange(pid, savedModel=''){
  const prov=aiProviders[pid]||{}; const models=prov.models||[];
  const sel=$('ai-model-sel'); if(!sel) return;
  sel.innerHTML='';
  models.forEach(m=>{ const o=document.createElement('option'); o.value=m; o.textContent=m; sel.appendChild(o); });
  const co=document.createElement('option'); co.value='__custom__'; co.textContent='自定义…'; sel.appendChild(co);
  if(savedModel && models.includes(savedModel)){
    sel.value=savedModel; $('ai-model-custom').style.display='none';
  } else if(savedModel){
    sel.value='__custom__'; $('ai-model-custom').style.display='block'; $('ai-model-custom').value=savedModel;
  } else {
    sel.value=models[0]||'__custom__';
    $('ai-model-custom').style.display=models.length?'none':'block';
  }
}

function onAiModelSelChange(v){
  $('ai-model-custom').style.display = v==='__custom__'?'block':'none';
}

function getAiModel(){
  const sel=$('ai-model-sel');
  return (!sel||sel.value==='__custom__') ? ($('ai-model-custom')?.value||'').trim() : sel.value;
}

async function saveAiSettings(){
  const provider=$('ai-provider')?.value||'';
  const key=$('ai-apikey')?.value.trim()||'';
  const model=getAiModel();
  const p=new URLSearchParams();
  if(provider) p.append('analyze_provider',provider);
  if(key)      p.append('analyze_api_key',key);
  if(model)    p.append('analyze_model',model);
  await api(`/api/settings?${p}`,{method:'POST'});
  const hint=$('ai-key-hint');
  if(hint) hint.textContent=key?`✓ 已保存  ${key.slice(0,8)}…`:'';
}

function aiAutoResize(el){
  el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px';
}

function aiOnKeydown(e){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); aiSend(); }
}

function aiSendPreset(text){
  const ta=$('ai-input'); if(!ta) return;
  ta.value=text; aiAutoResize(ta); aiSend();

function aiClearChat(){
  aiHistory=[];
  clearAiHistory();
  const msgs=$('ai-messages'); if(!msgs) return;
  msgs.innerHTML=`<div class="ai-welcome" id="ai-welcome">
    <div class="ai-welcome-icon" style="font-size:52px;filter:drop-shadow(0 0 24px rgba(124,106,247,.25))">◈</div>

function aiAppendMsg(role, content=''){
  const welcome=$('ai-welcome'); if(welcome) welcome.remove();
  const msgs=$('ai-messages');
  const wrap=document.createElement('div');
  wrap.className='ai-msg';
  const isUser=role==='user';
  wrap.innerHTML=`
    <div class="ai-avatar ${role}">${isUser?'👤':'🤖'}</div>
    <div class="ai-bubble">
      <div class="ai-bubble-name">${isUser?'你':'AI 助手'}</div>
      <div class="ai-md ${role==='assistant'&&!content?'ai-streaming':''}" id="ai-bubble-${Date.now()}">${
        content?mdToHtml(content).replace(/<\/?div[^>]*>/g,''):'　'
      }</div>
    </div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
  return wrap.querySelector('.ai-md');
}

async function aiSend(){
  if(aiStreaming||!curSession) return;
  const ta=$('ai-input'); if(!ta) return;
  const text=ta.value.trim(); if(!text) return;
  const apiKey=$('ai-apikey')?.value.trim()||'';
  const model=getAiModel();
  const provider=$('ai-provider')?.value||'deepseek';
  if(!apiKey){ alert('请先填写并保存 API Key'); return; }
  if(!model) { alert('请选择或填写模型名称'); return; }

  ta.value=''; aiAutoResize(ta);
  aiHistory.push({role:'user',content:text});
  saveAiHistory();
  aiAppendMsg('user',text);

  const sendBtn=$('ai-send-btn'); sendBtn.disabled=true;
  aiStreaming=true;
  const aiBubble=aiAppendMsg('assistant','');
  aiBubble.classList.add('ai-streaming');
  let raw='';

  try{
    const resp=await fetch(`/api/sessions/${curSession.id}/analyze`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({provider,api_key:apiKey,model,messages:[...aiHistory]}),
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      aiBubble.innerHTML=`<div class="ai-msg-error">⚠ ${esc(err.error||'请求失败')}</div>`;
      aiHistory.pop(); return;
    }
    const reader=resp.body.getReader(),dec=new TextDecoder();
    let buf='';
    while(true){
      const {done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        const data=line.slice(6).trim();
        if(data==='[DONE]') break;
        try{
          const chunk=JSON.parse(data);
          if(chunk.error){ aiBubble.innerHTML=`<div class="ai-msg-error">⚠ ${esc(chunk.error)}</div>`; return; }
          if(chunk.content){ raw+=chunk.content; aiBubble.innerHTML=mdToHtml(raw).replace(/<\/?div[^>]*>/g,''); }
          $('ai-messages').scrollTop=$('ai-messages').scrollHeight;
        }catch{}
      }
    }
    aiBubble.classList.remove('ai-streaming');
    aiHistory.push({role:'assistant',content:raw});
    saveAiHistory();
  } catch(e){
    aiBubble.innerHTML=`<div class="ai-msg-error">⚠ ${esc(String(e))}</div>`;
    aiHistory.pop();
  } finally{
    aiStreaming=false; sendBtn.disabled=false;
    $('ai-messages').scrollTop=$('ai-messages').scrollHeight;
  }
}

// 简易 Markdown → HTML
function mdToHtml(md){
  // 1. 去除 <think>...</think> 推理过程（含流式未闭合的情况）
  md = md.replace(/<think>[\s\S]*?<\/think>/g, '')
         .replace(/<think>[\s\S]*$/, '');

  // 2. 保护代码块，避免内部内容被后续规则误处理
  const codeBlocks = [];
  md = md.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code>${esc(code.replace(/\n$/, ''))}</code></pre>`);
    return `\x00CODE${idx}\x00`;
  });

  // 3. 逐行处理块级元素
  const lines = md.split('\n');
  const out = [];
  let i = 0;
  while(i < lines.length){
    const line = lines[i];

    // 标题
    if(/^### /.test(line)){ out.push(`<h3>${inlineEsc(line.slice(4))}</h3>`); i++; continue; }
    if(/^## /  .test(line)){ out.push(`<h2>${inlineEsc(line.slice(3))}</h2>`); i++; continue; }
    if(/^# /   .test(line)){ out.push(`<h1>${inlineEsc(line.slice(2))}</h1>`); i++; continue; }

    // 分隔线
    if(/^---+$/.test(line.trim())){ out.push('<hr>'); i++; continue; }

    // 表格（检测到 | 开头或含 |---|）
    if(/^\|/.test(line)){
      const tableLines = [];
      while(i < lines.length && /^\|/.test(lines[i])){ tableLines.push(lines[i]); i++; }
      out.push(buildTable(tableLines));
      continue;
    }

    // 无序列表
    if(/^\s*[-*] /.test(line)){
      const items = [];
      while(i < lines.length && /^\s*[-*] /.test(lines[i])){
        items.push(`<li>${inlineEsc(lines[i].replace(/^\s*[-*] /,''))}</li>`);
        i++;
      }
      out.push(`<ul>${items.join('')}</ul>`);
      continue;
    }

    // 有序列表
    if(/^\d+\. /.test(line)){
      const items = [];
      while(i < lines.length && /^\d+\. /.test(lines[i])){
        items.push(`<li>${inlineEsc(lines[i].replace(/^\d+\. /,''))}</li>`);
        i++;
      }
      out.push(`<ol>${items.join('')}</ol>`);
      continue;
    }

    // 空行
    if(line.trim() === ''){ out.push(''); i++; continue; }

    // 普通段落（合并连续非空行）
    const para = [];
    while(i < lines.length && lines[i].trim() !== '' &&
          !/^(#{1,3} |---+$|\||  *[-*] |\d+\. )/.test(lines[i])){
      para.push(inlineEsc(lines[i]));
      i++;
    }
    if(para.length) out.push(`<p>${para.join('<br>')}</p>`);
  }

  // 4. 合并输出，还原代码块
  let html = out.join('\n')
    .replace(/\x00CODE(\d+)\x00/g, (_, idx) => codeBlocks[idx]);

  return `<div class="ai-md">${html}</div>`;
}

function buildTable(lines){
  // 找到分隔行（|---|---| 形式）
  const sepIdx = lines.findIndex(l => /^\|[-| :]+\|$/.test(l));
  if(sepIdx < 0){
    // 无标准分隔行，按普通表格处理
    const rows = lines.map(l =>
      '<tr>' + l.replace(/^\||\|$/g,'').split('|')
        .map(c=>`<td>${inlineEsc(c.trim())}</td>`).join('') + '</tr>'
    );
    return `<table>${rows.join('')}</table>`;
  }
  const headerCells = lines[0].replace(/^\||\|$/g,'').split('|')
    .map(c=>`<th>${inlineEsc(c.trim())}</th>`).join('');
  const bodyRows = lines.slice(sepIdx+1).map(l =>
    '<tr>' + l.replace(/^\||\|$/g,'').split('|')
      .map(c=>`<td>${inlineEsc(c.trim())}</td>`).join('') + '</tr>'
  ).join('');
  return `<table><thead><tr>${headerCells}</tr></thead><tbody>${bodyRows}</tbody></table>`;
}

function inlineEsc(s){
  // 先 esc，再恢复行内元素
  return esc(s)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>');
}
